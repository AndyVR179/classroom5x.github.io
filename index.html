<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Classroom 55X</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Arial;background:#000;color:#fff}

.navbar{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px;
border-bottom:1px solid #111;
}

.logo{font-size:24px;font-weight:bold}

.container{display:flex}

.sidebar{
width:220px;
background:#000;
height:100vh;
position:fixed;
padding-top:20px;
border-right:1px solid #111;
}

.sidebar ul{list-style:none}
.sidebar li{
padding:12px 20px;
color:#aaa;
cursor:pointer;
transition:0.2s;
}
.sidebar li:hover{
background:#111;
color:#fff;
}
.sidebar li.active{
background:#111;
color:#fff;
}

.main{
margin-left:220px;
padding:30px;
width:100%;
}

.home-hero{
background:#111;
padding:60px;
border-radius:12px;
text-align:center;
margin-bottom:40px;
}

.home-hero h1{
font-size:34px;
}

.games{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
gap:20px;
}

.game-card{
background:#111;
border-radius:12px;
overflow:hidden;
cursor:pointer;
transition:.2s;
}

.game-card:hover{
transform:scale(1.05);
}

.game-card img{
width:100%;
height:140px;
object-fit:cover;
}

.game-card h3{
padding:10px;
font-size:14px;
}

.hidden{display:none}

.game-hero{
height:250px;
background:linear-gradient(135deg,#4a148c,#e91e63);
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
border-radius:12px;
position:relative;
text-align:center;
}

.back-btn{
position:absolute;
top:15px;
left:15px;
background:#000;
color:#fff;
border:1px solid #444;
padding:6px 12px;
cursor:pointer;
border-radius:6px;
}

.play-btn{
padding:10px 25px;
background:#fff;
color:#000;
border:none;
border-radius:6px;
cursor:pointer;
margin-top:15px;
font-weight:bold;
}

#gameFrame{
width:100%;
height:80vh;
border:none;
background:#000;
margin-top:20px;
}
</style>
</head>

<body>

<div class="navbar">
<div class="logo">CLASSROOM 55X</div>
</div>

<div class="container">

<div class="sidebar">
<ul>
<li class="active" onclick="filterCategory('All', this)">All Games</li>
<li onclick="filterCategory('Sports', this)">Sports</li>
<li onclick="filterCategory('Driving', this)">Driving</li>
<li onclick="filterCategory('Action', this)">Action</li>
<li onclick="filterCategory('Multiplayer', this)">Multiplayer</li>
</ul>
</div>

<div class="main">

<div id="homePage">

<div class="home-hero">
<h1>Classroom 55X fun games to play</h1>
</div>

<h2>Popular Games</h2>
<br>
<div class="games" id="gamesGrid"></div>

</div>

<div id="gamePage" class="hidden">

<div class="game-hero">
<button class="back-btn" onclick="goHome()">Back</button>
<h2 id="gameTitle"></h2>
<button class="play-btn" onclick="startGame()">Play</button>
</div>

<iframe id="gameFrame" allowfullscreen></iframe>

</div>

</div>
</div>

<script>
const games = [
{
title:"Basket Random",
category:"Sports",
url:"https://www.twoplayergames.org/embed/basket-random",
thumb:"https://dummyimage.com/300x170/222/fff&text=Basket+Random"
},
{
title:"Smash Karts",
category:"Multiplayer",
url:"https://smashkarts.io",
thumb:"https://dummyimage.com/300x170/333/fff&text=Smash+Karts"
},
{
title:"Drift Hunters",
category:"Driving",
url:"https://www.onlinegames.io/games/2021/unity/drift-hunters/index.html",
thumb:"https://dummyimage.com/300x170/444/fff&text=Drift+Hunters"
},
{
title:"Run 3",
category:"Action",
url:"https://run3.io",
thumb:"https://dummyimage.com/300x170/555/fff&text=Run+3"
},
{
title:"Soccer Random",
category:"Sports",
url:"https://www.twoplayergames.org/embed/soccer-random",
thumb:"https://dummyimage.com/300x170/666/fff&text=Soccer+Random"
}
];

let currentGame=null;

function renderGames(category="All"){
const grid=document.getElementById("gamesGrid");
grid.innerHTML="";
games.forEach(game=>{
if(category==="All"||game.category===category){
const card=document.createElement("div");
card.className="game-card";
card.innerHTML=`
<img src="${game.thumb}">
<h3>${game.title}</h3>
`;
card.onclick=()=>openGame(game);
grid.appendChild(card);
}
});
}

function filterCategory(category,el){
document.querySelectorAll(".sidebar li").forEach(li=>li.classList.remove("active"));
el.classList.add("active");
renderGames(category);
}

function openGame(game){
currentGame=game;
document.getElementById("homePage").classList.add("hidden");
document.getElementById("gamePage").classList.remove("hidden");
document.getElementById("gameTitle").innerText=game.title;
document.getElementById("gameFrame").src="";
}

function startGame(){
document.getElementById("gameFrame").src=currentGame.url;
}

function goHome(){
document.getElementById("gameFrame").src="";
document.getElementById("gamePage").classList.add("hidden");
document.getElementById("homePage").classList.remove("hidden");
}

renderGames();
</script>

</body>
</html>
