<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Classroom 55X</title>

<style>
body{
margin:0;
font-family:Arial;
background:#000;
color:#fff;
text-align:center;
}

h1{
padding:30px 0;
font-size:40px;
}

.games{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
padding:20px;
max-width:1000px;
margin:auto;
}

.game{
background:#111;
border-radius:15px;
overflow:hidden;
cursor:pointer;
transition:0.2s;
}

.game:hover{
transform:scale(1.05);
}

.game img{
width:100%;
height:150px;
object-fit:cover;
}

.game h3{
padding:10px;
}

#gamePage{
display:none;
padding:20px;
}

iframe{
width:100%;
height:90vh;
border:none;
}

button{
padding:10px 20px;
margin-bottom:15px;
background:#111;
color:white;
border:1px solid #444;
cursor:pointer;
}

button:hover{
background:#222;
}
</style>
</head>

<body>

<h1>Classroom 55X fun games to play</h1>

<div id="homePage" class="games"></div>

<div id="gamePage">
<button onclick="goHome()">⬅ Back</button>
<h2 id="gameTitle"></h2>
<iframe id="gameFrame" allowfullscreen></iframe>
</div>

<script>

const games = [

{
title:"Basket Random",
url:"https://www.twoplayergames.org/embed/basket-random",
img:"https://dummyimage.com/400x200/222/fff&text=Basket+Random"
},
{
title:"Soccer Random",
url:"https://www.twoplayergames.org/embed/soccer-random",
img:"https://dummyimage.com/400x200/444/fff&text=Soccer+Random"
},
{
title:"Smash Karts",
url:"https://smashkarts.io",
img:"https://dummyimage.com/400x200/333/fff&text=Smash+Karts"
},
{
title:"Friday Night Funkin",
url:"https://fnf.kdata1.com/2021/07/fnf-week7/",
img:"https://dummyimage.com/400x200/990000/fff&text=FNF"
},
{
title:"Geometry Dash",
url:"https://geometrydash.io",
img:"https://dummyimage.com/400x200/00aa00/fff&text=Geometry+Dash"
},
{
title:"Snow Rider 3D",
url:"https://ubg365.github.io/snowrider3d/",
img:"https://dummyimage.com/400x200/00bbbb/fff&text=Snow+Rider"
}

];

const home = document.getElementById("homePage");

games.forEach(game=>{
const div = document.createElement("div");
div.className="game";
div.innerHTML=`
<img src="${game.img}">
<h3>${game.title}</h3>
`;
div.onclick=()=>openGame(game);
home.appendChild(div);
});

function openGame(game){
document.getElementById("homePage").style.display="none";
document.getElementById("gamePage").style.display="block";
document.getElementById("gameTitle").innerText=game.title;
document.getElementById("gameFrame").src=game.url;
window.scrollTo(0,0);
}

function goHome(){
document.getElementById("gameFrame").src="";
document.getElementById("gamePage").style.display="none";
document.getElementById("homePage").style.display="grid";
}

</script>

</body>
</html>
