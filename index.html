<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Game Site</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #111;
    color: white;
}

h1 {
    text-align: center;
    padding: 20px;
}

.game-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 20px;
    padding: 20px;
}

.game-card {
    background: #1c1c1c;
    border-radius: 10px;
    overflow: hidden;
    transition: 0.3s;
    cursor: pointer;
    text-align: center;
}

.game-card:hover {
    transform: scale(1.05);
}

.game-card img {
    width: 100%;
    height: 160px;
    object-fit: cover;
}

.game-card h3 {
    padding: 10px;
    margin: 0;
}
</style>
</head>

<body>

<h1>My Games</h1>

<div class="game-grid">

    <!-- Geometry Dash -->
    <div class="game-card" onclick="location.href='geometry-dash.html'">
        <img src="geometry-dash.jpg" alt="Geometry Dash">
        <h3>Geometry Dash</h3>
    </div>

    <!-- Basket Random -->
    <div class="game-card" onclick="location.href='basket-random.html'">
        <img src="https://jasongamesdev.github.io/basket-random/basket-random.png" alt="Basket Random">
        <h3>Basket Random</h3>
    </div>

    <!-- Thorn and Balloons -->
    <div class="game-card" onclick="location.href='thorn-and-balloons.html'">
        <img src="https://jasongamesdev.github.io/thorn-and-balloons/thorn-and-balloons.png" alt="Thorn and Balloons">
        <h3>Thorn and Balloons</h3>
    </div>

</div>

</body>
</html>
